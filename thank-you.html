    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0C1B2A;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo { margin-bottom: 3rem; }
        .logo img { max-width: 280px; height: auto; }
        .logo-text {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            color: #FFFFFF;
            margin-bottom: 0.25rem;
        }
        .logo-text span { color: #D4956B; }
        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            color: #FFFFFF;
            margin-bottom: 1rem;
            line-height: 1.3;
        }
        h1 em { font-style: normal; color: #D4956B; }
        p {
            font-size: 1.1rem;
            color: #94A3B8;
            max-width: 500px;
            line-height: 1.7;
            margin-bottom: 2rem;
        }
        .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #B87333; color: #FFFFFF; border: none;
        }
        .btn-primary:hover {
            background: #8B5A2B;
            box-shadow: 0 4px 15px rgba(184,115,51,0.3);
        }
        .btn-outline {
            background: transparent; color: #D4956B;
            border: 2px solid #B87333;
        }
        .btn-outline:hover {
            background: #B87333; color: #FFFFFF;
        }
        .divider {
            width: 60px; height: 2px;
            background: #B87333;
            margin: 2rem auto;
        }
        .contact-info {
            font-size: 0.9rem;
            color: #64748B;
        }
        .contact-info a {
            color: #D4956B;
            text-decoration: none;
        }
        .contact-info a:hover { text-decoration: underline; }

    <div class="logo">

        <a href="https://coppermoon.io">coppermoon.io</a>
